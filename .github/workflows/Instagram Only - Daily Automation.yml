name: Instagram Only - Daily Automation

on:
  schedule:
    # 7 AM EST (11 AM UTC)
    - cron: '0 11 * * *'
    # 12 PM EST (4 PM UTC)
    - cron: '0 16 * * *'
    # 6 PM EST (10 PM UTC)
    - cron: '0 22 * * *'
  workflow_dispatch:

jobs:
  automation:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v3
      
      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '18'
      
      - name: Install dependencies
        run: npm install
      
      - name: Run Instagram Only - Daily Automation
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          INSTAGRAM_TOKEN: ${{ secrets.INSTAGRAM_TOKEN }}
          INSTAGRAM_PAGE_ID: ${{ secrets.INSTAGRAM_PAGE_ID }}
          EMAIL_USER: ${{ secrets.EMAIL_USER }}
          EMAIL_PASSWORD: ${{ secrets.EMAIL_PASSWORD }}
        run: node agent.js
      
      - name: Success
        if: success()
        run: echo "✅ Instagram post successful"
      
      - name: Failure
        if: failure()
        run: echo "❌ Instagram post failed"
