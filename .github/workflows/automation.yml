name: From Owner to Investor - Daily Automation

on:
  schedule:
    # 7 AM EST (11 AM UTC)
    - cron: '0 11 * * *'
    # 12 PM EST (4 PM UTC)
    - cron: '0 16 * * *'
    # 6 PM EST (10 PM UTC)
    - cron: '0 22 * * *'
  workflow_dispatch:  # Allow manual trigger

jobs:
  automation:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v3
      
      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '18'
      
      - name: Install dependencies
        run: npm install
      
      - name: Run automation
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          INSTAGRAM_TOKEN: ${{ secrets.INSTAGRAM_TOKEN }}
          FACEBOOK_TOKEN: ${{ secrets.FACEBOOK_TOKEN }}
          YOUTUBE_TOKEN: ${{ secrets.YOUTUBE_TOKEN }}
          INSTAGRAM_PAGE_ID: ${{ secrets.INSTAGRAM_PAGE_ID }}
          FACEBOOK_PAGE_ID: ${{ secrets.FACEBOOK_PAGE_ID }}
          YOUTUBE_CHANNEL_ID: ${{ secrets.YOUTUBE_CHANNEL_ID }}
          EMAIL_USER: ${{ secrets.EMAIL_USER }}
          EMAIL_PASSWORD: ${{ secrets.EMAIL_PASSWORD }}
        run: node agent.js
      
      - name: Log success
        if: success()
        run: echo "✅ Automation completed successfully"
      
      - name: Log failure
        if: failure()
        run: echo "❌ Automation failed - check logs"
